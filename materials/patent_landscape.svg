<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <style>
    text { font-family: "Rounded Mplus 1c", "Rounded Mplus 1c Bold", sans-serif; }
    .navy { fill: #1F3B63; }
  </style>

  <!-- sparkles -->
  <g fill="#F5C63F">
    <path d="M110 300 Q118 322 140 330 Q118 338 110 360 Q102 338 80 330 Q102 322 110 300 Z"/>
    <path d="M1395 215 Q1402 234 1421 241 Q1402 248 1395 267 Q1388 248 1369 241 Q1388 234 1395 215 Z"/>
    <path d="M125 965 Q131 981 147 987 Q131 993 125 1009 Q119 993 103 987 Q119 981 125 965 Z"/>
  </g>

  <!-- Document card (slightly rotated) -->
  <g transform="rotate(-5 590 580)">
    <!-- shadow -->
    <rect x="316" y="136" width="580" height="920" rx="18" fill="#DDDDDA"/>
    <!-- card -->
    <rect x="300" y="120" width="580" height="920" rx="18" fill="#FBFBF9" stroke="#D8D2C6" stroke-width="3"/>
    <!-- navy top bar -->
    <rect x="318" y="138" width="544" height="32" rx="16" fill="#1F3B63"/>

    <!-- title -->
    <text x="598" y="264" text-anchor="middle" font-size="64" font-weight="700" letter-spacing="16" class="navy">特許出願書</text>
    <line x1="382" y1="296" x2="798" y2="296" stroke="#1F3B63" stroke-width="6" stroke-linecap="round"/>

    <!-- light bulb with rays -->
    <g stroke="#F0B429" stroke-width="7" stroke-linecap="round">
      <line x1="590" y1="330" x2="590" y2="352"/>
      <line x1="519" y1="356" x2="534" y2="373"/>
      <line x1="661" y1="356" x2="646" y2="373"/>
    </g>
    <circle cx="590" cy="432" r="56" fill="#F8C64B"/>
    <path d="M 601 402 L 575 436 L 588 436 L 579 462 L 605 426 L 592 426 Z" fill="#FFFFFF"/>
    <rect x="574" y="486" width="32" height="10" rx="5" fill="#8E959F"/>
    <rect x="578" y="500" width="24" height="9" rx="4.5" fill="#8E959F"/>

    <!-- text lines -->
    <rect x="350" y="566" width="480" height="20" rx="10" fill="#B6BDC9"/>
    <rect x="350" y="614" width="480" height="20" rx="10" fill="#B6BDC9"/>
    <rect x="350" y="662" width="360" height="20" rx="10" fill="#B6BDC9"/>
    <rect x="350" y="726" width="480" height="20" rx="10" fill="#B6BDC9"/>
    <rect x="350" y="774" width="420" height="20" rx="10" fill="#B6BDC9"/>

    <!-- condition box -->
    <rect x="344" y="836" width="492" height="92" rx="14" fill="#ECF1FA" stroke="#1F3B63" stroke-width="4.5"/>
    <text x="590" y="895" text-anchor="middle" font-size="33" font-weight="700" class="navy">条件：ロイヤリティー　０円</text>

    <!-- small round seal -->
    <circle cx="812" cy="984" r="30" fill="#FFFFFF" stroke="#D0413B" stroke-width="4"/>
    <text x="812" y="997" text-anchor="middle" font-size="34" font-weight="700" fill="#D0413B">印</text>
  </g>

  <!-- big red stamp -->
  <g transform="translate(1195 830) rotate(-12)">
    <circle cx="0" cy="0" r="308" fill="#FFFFFF" fill-opacity="0.97" stroke="#CB3B32" stroke-width="24"/>
    <circle cx="0" cy="0" r="252" fill="none" stroke="#CB3B32" stroke-width="9"/>
    <clipPath id="stampClipL"><circle cx="0" cy="0" r="296"/></clipPath>
    <g clip-path="url(#stampClipL)">
      <line x1="-310" y1="-138" x2="310" y2="-138" stroke="#CB3B32" stroke-width="9"/>
      <line x1="-310" y1="138" x2="310" y2="138" stroke="#CB3B32" stroke-width="9"/>
    </g>
    <rect x="-240" y="-224" width="480" height="100" rx="26" fill="#FFFFFF"/>
    <text x="0" y="-153" text-anchor="middle" font-size="58" font-weight="800" letter-spacing="2" fill="#CB3B32">ロイヤリティー</text>
    <text x="0" y="92" text-anchor="middle" font-size="216" font-weight="800" fill="#CB3B32">￥0</text>
    <text x="0" y="228" text-anchor="middle" font-size="64" font-weight="800" letter-spacing="22" fill="#CB3B32">条件付</text>
  </g>
</svg>
