name: RSS新記事チェック＆自動投稿

on:
  schedule:
    # JST 23:00 = UTC 14:00 ★チェックのみ（翌日8・12・17時に投稿）
    - cron: '0 14 * * *'
    # JST  9:00 = UTC 00:00 ★チェック＋投稿
    - cron: '0 0 * * *'
    # JST 12:00 = UTC  3:00 ★チェック＋投稿
    - cron: '0 3 * * *'
    # JST 17:00 = UTC  8:00 ★チェック＋投稿
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: rss-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストールする
        run: pip install -r requirements.txt

      - name: 23時チェックかどうか判定
        run: |
          if [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            echo "SCHEDULE_ONLY=1" >> $GITHUB_ENV
            echo "▶ 23時チェックのみモード（投稿は翌日8・12・17時）"
          else
            echo "SCHEDULE_ONLY=0" >> $GITHUB_ENV
            echo "▶ チェック＋投稿モード"
          fi

      - name: RSS チェック実行（新記事検知＆スケジュール登録）
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SCHEDULE_ONLY: ${{ env.SCHEDULE_ONLY }}
        run: python check_new_post.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --mixed origin/main
          git add scheduled_posts.json posted_urls.txt || true
          if git diff --cached --quiet; then
            echo "変更なし、スキップ"
          else
            git commit -m "chore: 自動投稿をスケジュール登録 [skip ci]"
            git push --force-with-lease
          fi

      # 投稿送信は send_posts.yml（10分おき）に一本化
      # check_rss.yml からは send_posts.py を呼ばない（重複投稿防止）
