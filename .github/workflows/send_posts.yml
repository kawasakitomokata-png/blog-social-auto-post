name: スケジュール投稿送信（X・Threads）

on:
  schedule:
    - cron: '5 0 * * *'   # JST  9:05（RSSチェック後）
    - cron: '5 3 * * *'   # JST 12:05（RSSチェック後）
    - cron: '5 8 * * *'   # JST 17:05（RSSチェック後）
  workflow_dispatch:

concurrency:
  group: send-posts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send-posts:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 投稿送信実行
        env:
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN:   ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:        ${{ secrets.THREADS_USER_ID }}
        run: python send_posts.py

      - name: 送信済みフラグをコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          # リモートの最新版に、ローカルの sent:true フラグをマージして上書き
          git show origin/main:scheduled_posts.json > /tmp/remote_posts.json 2>/dev/null || cp scheduled_posts.json /tmp/remote_posts.json
          python3 - << 'PYEOF'
import json, sys
with open('/tmp/remote_posts.json') as f:
    remote = json.load(f)
with open('scheduled_posts.json') as f:
    local = json.load(f)
# ローカルで sent:true になったものをリモートに反映
local_map = {(p['send_at'], p.get('angle','')): p for p in local}
for p in remote:
    key = (p['send_at'], p.get('angle',''))
    if key in local_map and local_map[key].get('sent'):
        p['sent']    = True
        p['sent_at'] = local_map[key].get('sent_at')
        p['results'] = local_map[key].get('results', {})
with open('scheduled_posts.json', 'w') as f:
    json.dump(remote, f, ensure_ascii=False, indent=2)
print('Merge OK')
PYEOF

          git reset --mixed origin/main
          git add scheduled_posts.json || true
          if git diff --cached --quiet; then
            echo "変更なし、スキップ"
          else
            git commit -m "chore: 投稿送信済みを更新 [skip ci]"
            git push --force-with-lease
          fi
