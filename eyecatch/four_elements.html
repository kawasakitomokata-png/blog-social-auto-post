<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 480px; }
  table { border-collapse: collapse; }
  .word {
    font-family: "IPAGothic", "Noto Sans CJK JP", sans-serif;
    font-weight: bold;
    font-size: 54px;
    letter-spacing: 4px;
    color: #ffffff;
    -webkit-text-stroke: 8px #ff4fae;
    paint-order: stroke fill;
    text-shadow: 0 0 10px rgba(255, 79, 174, 0.55);
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- 外側テーブル(額縁) -->
<table width="480" bgcolor="#c98fd0" cellpadding="14" cellspacing="0">
<tr><td>

  <!-- 2段目テーブル(まだら背景・1x4) -->
  <table width="100%" cellpadding="0" cellspacing="10" bgcolor="#b98ad6">
  <tr>
    <td bgcolor="#e9a6cf" align="center" height="150">
      <!-- 3段目テーブル(要素セル) -->
      <table bgcolor="#f2bedd" cellpadding="16" cellspacing="0">
      <tr><td align="center"><span class="word">管理のみ</span></td></tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#c7a3e6" align="center" height="150">
      <table bgcolor="#d9bcef" cellpadding="16" cellspacing="0">
      <tr><td align="center"><span class="word">常識的</span></td></tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#cf9adf" align="center" height="150">
      <table bgcolor="#e0b3ea" cellpadding="16" cellspacing="0">
      <tr><td align="center"><span class="word">国家財産</span></td></tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#e6a9c4" align="center" height="150">
      <table bgcolor="#f1c4d8" cellpadding="16" cellspacing="0">
      <tr><td align="center"><span class="word">正当</span></td></tr>
      </table>
    </td>
  </tr>
  </table>

</td></tr>
</table>

</body>
</html>
