<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef5fb"/>
      <stop offset="1" stop-color="#dcebf8"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <rect x="0" y="500" width="1000" height="100" fill="#cfe3cf"/>

  <!-- ================= 大学（校舎） ================= -->
  <g>
    <!-- 階段 -->
    <polygon points="560,500 880,500 850,470 590,470" fill="#d7dae0"/>
    <!-- 柱の土台 -->
    <rect x="575" y="455" width="290" height="12" fill="#e3e6d8"/>
    <rect x="596" y="305" width="26" height="150" rx="3" fill="#eef0e6"/><rect x="594" y="300" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="594" y="452" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="650" y="305" width="26" height="150" rx="3" fill="#eef0e6"/><rect x="648" y="300" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="648" y="452" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="704" y="305" width="26" height="150" rx="3" fill="#eef0e6"/><rect x="702" y="300" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="702" y="452" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="758" y="305" width="26" height="150" rx="3" fill="#eef0e6"/><rect x="756" y="300" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="756" y="452" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="812" y="305" width="26" height="150" rx="3" fill="#eef0e6"/><rect x="810" y="300" width="30" height="10" rx="3" fill="#e3e6d8"/><rect x="810" y="452" width="30" height="10" rx="3" fill="#e3e6d8"/>
    <!-- 梁 -->
    <rect x="568" y="278" width="304" height="24" rx="4" fill="#e7eadb"/>
    <!-- 破風（ペディメント） -->
    <polygon points="720,205 560,278 880,278" fill="#4f7cc0"/>
    <polygon points="720,222 590,278 850,278" fill="#6f99d6"/>
    <!-- 紋章 -->
    <circle cx="720" cy="252" r="15" fill="#ffd34d" stroke="#d9a417" stroke-width="2"/>
    <text x="720" y="258" font-family="Noto Sans CJK JP, sans-serif" font-size="16" font-weight="bold" fill="#7a5b00" text-anchor="middle">学</text>
    <!-- 看板「大学」 -->
    <rect x="640" y="408" width="160" height="40" rx="8" fill="#ffffff" stroke="#4f7cc0" stroke-width="3"/>
    <text x="720" y="437" font-family="Noto Sans CJK JP, sans-serif" font-size="26" font-weight="bold" fill="#2f5b97" text-anchor="middle">大学</text>
  </g>

  <!-- ================= 依頼者（発明者） ================= -->
  <g>
    <!-- 電球（アイデア＝発明） -->
    <g transform="translate(150,150)">
      <circle cx="0" cy="0" r="26" fill="#ffe27a" stroke="#e6b800" stroke-width="3"/>
      <rect x="-9" y="22" width="18" height="10" rx="2" fill="#b9c0c9"/>
      <rect x="-9" y="30" width="18" height="6" rx="2" fill="#9aa4af"/>
      <path d="M-7,-2 Q0,-14 7,-2" fill="none" stroke="#e6b800" stroke-width="3" stroke-linecap="round"/>
      <line x1="34" y1="-18" x2="46" y2="-28" stroke="#ffcf3f" stroke-width="4" stroke-linecap="round"/>
      <line x1="38" y1="0" x2="54" y2="0" stroke="#ffcf3f" stroke-width="4" stroke-linecap="round"/>
      <line x1="34" y1="18" x2="46" y2="28" stroke="#ffcf3f" stroke-width="4" stroke-linecap="round"/>
    </g>
    <!-- 体 -->
    <rect x="120" y="372" width="76" height="92" rx="20" fill="#3a6ea5"/>
    <!-- 脚 -->
    <rect x="132" y="452" width="22" height="48" rx="6" fill="#2f3b52"/>
    <rect x="162" y="452" width="22" height="48" rx="6" fill="#2f3b52"/>
    <!-- 頭 -->
    <circle cx="158" cy="338" r="30" fill="#f3c9a8"/>
    <path d="M130,332 Q132,300 158,300 Q184,300 186,332 Q176,318 158,320 Q140,318 130,332 Z" fill="#5b3a29"/>
    <!-- 腕（書類を差し出す） -->
    <rect x="186" y="388" width="78" height="20" rx="10" fill="#f3c9a8" transform="rotate(-12 186 398)"/>
    <!-- 出願書類（手元） -->
    <g transform="translate(250,360) rotate(-8)">
      <rect x="0" y="0" width="84" height="108" rx="6" fill="#ffffff" stroke="#c7cdd6" stroke-width="2"/>
      <rect x="0" y="0" width="84" height="24" rx="6" fill="#ff6f61"/>
      <text x="42" y="18" font-family="Noto Sans CJK JP, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">特許出願</text>
      <line x1="12" y1="40" x2="72" y2="40" stroke="#d3d8e0" stroke-width="3"/>
      <line x1="12" y1="54" x2="72" y2="54" stroke="#d3d8e0" stroke-width="3"/>
      <line x1="12" y1="68" x2="72" y2="68" stroke="#d3d8e0" stroke-width="3"/>
      <circle cx="60" cy="86" r="15" fill="none" stroke="#e23b2e" stroke-width="3"/>
      <text x="60" y="91" font-family="Noto Sans CJK JP, sans-serif" font-size="12" font-weight="bold" fill="#e23b2e" text-anchor="middle">印</text>
    </g>
  </g>

  <!-- ================= 依頼の矢印 ================= -->
  <g>
    <path d="M360,400 Q455,360 545,392" fill="none" stroke="#2f5b97" stroke-width="6" stroke-linecap="round"/>
    <polygon points="545,392 524,382 528,400 Z" fill="#2f5b97"/>
    <rect x="392" y="322" width="190" height="40" rx="20" fill="#2f5b97"/>
    <text x="487" y="350" font-family="Noto Sans CJK JP, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">特許出願を依頼</text>
  </g>
</svg>