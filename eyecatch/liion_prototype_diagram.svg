<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="リチウムイオン二次電池の原型 模式図">
  <title>リチウムイオン二次電池の原型（1983年）模式図</title>
  <desc>負極ポリアセチレン・正極LiCoO2・有機溶媒電解液とLiイオンの移動を示す模式図</desc>
  <style>text{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}</style>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <!-- タイトル -->
  <text x="600" y="60" font-size="46" font-weight="800" fill="#1F2D3D" text-anchor="middle">リチウムイオン二次電池の原型（1983年）</text>
  <text x="600" y="98" font-size="25" fill="#5B6B7B" text-anchor="middle">放電時のしくみ ─ Li⁺ が負極→正極へ移動</text>

  <!-- ===== 外部回路 ===== -->
  <g stroke="#37474F" stroke-width="6" fill="none">
    <path d="M360 305 V200 H584"/>
    <path d="M616 200 H840 V305"/>
  </g>
  <!-- 豆電球（負荷） -->
  <g transform="translate(600 150)">
    <!-- 光の線 -->
    <g stroke="#F4B400" stroke-width="5" stroke-linecap="round">
      <line x1="0" y1="-52" x2="0" y2="-74"/>
      <line x1="-36" y1="-38" x2="-52" y2="-54"/>
      <line x1="36" y1="-38" x2="52" y2="-54"/>
      <line x1="-52" y1="-4" x2="-74" y2="-8"/>
      <line x1="52" y1="-4" x2="74" y2="-8"/>
    </g>
    <!-- ガラス球 -->
    <circle cx="0" cy="0" r="42" fill="#FFE08A" stroke="#E8A300" stroke-width="5"/>
    <!-- ハイライト -->
    <ellipse cx="-15" cy="-16" rx="9" ry="14" fill="#FFFFFF" fill-opacity="0.65"/>
    <!-- フィラメント -->
    <g stroke="#C97A18" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-11 34 V6"/>
      <path d="M11 34 V6"/>
      <path d="M-11 6 l5.5 9 l5.5 -9 l5.5 9 l5.5 -9"/>
    </g>
    <!-- 口金（金属ねじ） -->
    <path d="M-18 32 h36 v12 q0 6 -8 6 h-20 q-8 0 -8 -6 z" fill="#AEB6BD" stroke="#7E868E" stroke-width="2"/>
    <g stroke="#7E868E" stroke-width="2.5">
      <line x1="-16" y1="38" x2="16" y2="38"/>
      <line x1="-14" y1="44" x2="14" y2="44"/>
    </g>
    <!-- 底の接点 -->
    <rect x="-8" y="54" width="16" height="9" rx="3" fill="#6E767E"/>
  </g>
  <!-- 電子の流れ e- -->
  <g>
    <path d="M428 180 h60" stroke="#2E7D32" stroke-width="6" marker-end="url(#agreen)"/>
    <path d="M690 180 h60" stroke="#2E7D32" stroke-width="6" marker-end="url(#agreen)"/>
    <text x="456" y="164" font-size="24" font-weight="700" fill="#2E7D32" text-anchor="middle">e⁻</text>
    <text x="718" y="164" font-size="24" font-weight="700" fill="#2E7D32" text-anchor="middle">e⁻</text>
  </g>

  <!-- ===== セル本体 ===== -->
  <rect x="240" y="305" width="720" height="395" rx="20" fill="#EAF3FB" stroke="#B9D4EC" stroke-width="3"/>

  <!-- 端子 -->
  <rect x="345" y="281" width="30" height="30" fill="#37474F"/>
  <text x="360" y="266" font-size="30" font-weight="800" fill="#C0392B" text-anchor="middle">−</text>
  <rect x="825" y="281" width="30" height="30" fill="#37474F"/>
  <text x="840" y="268" font-size="30" font-weight="800" fill="#1F6FB0" text-anchor="middle">＋</text>

  <!-- 負極 -->
  <rect x="280" y="350" width="170" height="305" rx="8" fill="#4A4A4A"/>
  <text x="365" y="410" font-size="29" font-weight="800" fill="#FFFFFF" text-anchor="middle">負極</text>
  <text x="365" y="450" font-size="23" fill="#E8E8E8" text-anchor="middle">ポリアセチレン</text>
  <text x="365" y="480" font-size="21" fill="#C2C2C2" text-anchor="middle">(CH)ₓ</text>

  <!-- 正極 -->
  <rect x="750" y="350" width="170" height="305" rx="8" fill="#2E6FB0"/>
  <text x="835" y="408" font-size="29" font-weight="800" fill="#FFFFFF" text-anchor="middle">正極</text>
  <text x="835" y="446" font-size="23" fill="#E9F1FB" text-anchor="middle">コバルト酸</text>
  <text x="835" y="476" font-size="23" fill="#E9F1FB" text-anchor="middle">リチウム</text>
  <text x="835" y="508" font-size="22" fill="#D2E3F6" text-anchor="middle">LiCoO₂</text>

  <!-- 電解液・セパレータ -->
  <text x="600" y="392" font-size="24" fill="#3E6285" text-anchor="middle">電解液（有機溶媒）</text>
  <line x1="600" y1="412" x2="600" y2="650" stroke="#9CC0E0" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="600" y="678" font-size="20" fill="#6E8AA6" text-anchor="middle">セパレータ</text>

  <!-- Li+ イオン移動（Li⁺の円と矢印を上下に分け、文字と被らせない） -->
  <text x="600" y="498" font-size="27" font-weight="800" fill="#C96A0F" text-anchor="middle">放電</text>
  <!-- Li⁺ の円（上段） -->
  <g>
    <g><circle cx="510" cy="548" r="22" fill="#F4A81E" stroke="#C97A18" stroke-width="3"/>
       <text x="510" y="556" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">Li⁺</text></g>
    <g><circle cx="590" cy="548" r="22" fill="#F4A81E" stroke="#C97A18" stroke-width="3"/>
       <text x="590" y="556" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">Li⁺</text></g>
    <g><circle cx="670" cy="548" r="22" fill="#F4A81E" stroke="#C97A18" stroke-width="3"/>
       <text x="670" y="556" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">Li⁺</text></g>
  </g>
  <!-- 方向矢印（下段・小さな矢じり） -->
  <path d="M480 602 H700" stroke="#E8861E" stroke-width="6" marker-end="url(#aorange)"/>

  <!-- 充電の注記 -->
  <text x="600" y="742" font-size="22" fill="#6E7E92" text-anchor="middle">※ 充電時は逆向き（Li⁺は 正極 → 負極、電子も逆流）</text>

  <!-- 出典・経緯 -->
  <rect x="90" y="772" width="1020" height="112" rx="12" fill="#F5F7FA" stroke="#E1E7EE" stroke-width="2"/>
  <text x="112" y="808" font-size="20" fill="#42536A">・ポリアセチレン（電気を通すプラスチック）：白川英樹 1977年発見（2000年ノーベル化学賞）</text>
  <text x="112" y="838" font-size="20" fill="#42536A">・コバルト酸リチウム LiCoO₂：J. グッドイナフら 1980年発見</text>
  <text x="112" y="868" font-size="20" fill="#42536A">・負極への適用と原型の創出：吉野彰ら（旭化成）1981年／1983年（2019年ノーベル化学賞）</text>

  <defs>
    <marker id="agreen" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2E7D32"/></marker>
    <marker id="aorange" markerUnits="userSpaceOnUse" markerWidth="18" markerHeight="18" refX="9" refY="9" orient="auto">
      <path d="M0 0 L18 9 L0 18 z" fill="#E8861E"/></marker>
  </defs>
</svg>
