<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="リチウムイオン二次電池の原型 模式図">
  <title>リチウムイオン二次電池の原型（1983年）模式図</title>
  <desc>負極ポリアセチレン・正極LiCoO2・有機溶媒電解液とLiイオンの移動を示す模式図</desc>
  <style>
    text{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}
  </style>

  <rect width="1200" height="860" fill="#FFFFFF"/>

  <!-- タイトル -->
  <text x="600" y="58" font-size="38" font-weight="800" fill="#1F2D3D" text-anchor="middle">リチウムイオン二次電池の原型（1983年）</text>
  <text x="600" y="92" font-size="20" fill="#5B6B7B" text-anchor="middle">放電時のしくみ ─ Li⁺ が負極→正極へ移動</text>

  <!-- ===== 外部回路 ===== -->
  <g stroke="#37474F" stroke-width="6" fill="none">
    <path d="M360 300 V160 H520"/>
    <path d="M680 160 H840 V300"/>
  </g>
  <!-- 豆電球（負荷） -->
  <g transform="translate(600 160)">
    <circle cx="0" cy="0" r="42" fill="#FFF3C4" stroke="#E8A300" stroke-width="6"/>
    <path d="M-16 14 q16 -34 0 -56 M16 14 q-16 -34 0 -56" stroke="#E8A300" stroke-width="4" fill="none"/>
    <rect x="-14" y="14" width="28" height="14" rx="3" fill="#B5790F"/>
    <g stroke="#F4B400" stroke-width="5" stroke-linecap="round">
      <line x1="0" y1="-58" x2="0" y2="-74"/>
      <line x1="-46" y1="-30" x2="-62" y2="-40"/>
      <line x1="46" y1="-30" x2="62" y2="-40"/>
    </g>
  </g>
  <!-- 電子の流れ e- -->
  <g>
    <path d="M430 150 h70" stroke="#2E7D32" stroke-width="5" marker-end="url(#agreen)"/>
    <path d="M700 150 h70" stroke="#2E7D32" stroke-width="5" marker-end="url(#agreen)"/>
    <text x="465" y="135" font-size="20" font-weight="700" fill="#2E7D32" text-anchor="middle">e⁻</text>
    <text x="735" y="135" font-size="20" font-weight="700" fill="#2E7D32" text-anchor="middle">e⁻</text>
  </g>

  <!-- ===== セル本体 ===== -->
  <rect x="250" y="300" width="700" height="380" rx="20" fill="#EAF3FB" stroke="#B9D4EC" stroke-width="3"/>

  <!-- 端子 -->
  <rect x="345" y="276" width="30" height="30" fill="#37474F"/>
  <text x="360" y="262" font-size="26" font-weight="800" fill="#C0392B" text-anchor="middle">−</text>
  <rect x="825" y="276" width="30" height="30" fill="#37474F"/>
  <text x="840" y="262" font-size="26" font-weight="800" fill="#1F6FB0" text-anchor="middle">＋</text>

  <!-- 負極 -->
  <rect x="290" y="340" width="150" height="300" rx="8" fill="#4A4A4A"/>
  <text x="365" y="395" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">負極</text>
  <text x="365" y="430" font-size="19" fill="#E0E0E0" text-anchor="middle">ポリアセチレン</text>
  <text x="365" y="456" font-size="17" fill="#BDBDBD" text-anchor="middle">(CH)ₓ</text>

  <!-- 正極 -->
  <rect x="760" y="340" width="150" height="300" rx="8" fill="#2E6FB0"/>
  <text x="835" y="395" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">正極</text>
  <text x="835" y="430" font-size="19" fill="#E6F0FA" text-anchor="middle">コバルト酸</text>
  <text x="835" y="454" font-size="19" fill="#E6F0FA" text-anchor="middle">リチウム</text>
  <text x="835" y="480" font-size="18" fill="#CFE2F5" text-anchor="middle">LiCoO₂</text>

  <!-- 電解液・セパレータ -->
  <text x="600" y="365" font-size="19" fill="#3E6285" text-anchor="middle">電解液（有機溶媒）</text>
  <line x1="600" y1="385" x2="600" y2="640" stroke="#9CC0E0" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="600" y="665" font-size="16" fill="#6E8AA6" text-anchor="middle">セパレータ</text>

  <!-- Li+ イオン移動 -->
  <g>
    <path d="M470 520 H730" stroke="#E8861E" stroke-width="6" marker-end="url(#aorange)"/>
    <g font-size="0">
      <!-- イオン粒 -->
    </g>
  </g>
  <g font-family="sans-serif">
    <g>
      <circle cx="500" cy="560" r="20" fill="#F4A81E" stroke="#C97A18" stroke-width="3"/>
      <text x="500" y="567" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle">Li⁺</text>
    </g>
    <g>
      <circle cx="600" cy="560" r="20" fill="#F4A81E" stroke="#C97A18" stroke-width="3"/>
      <text x="600" y="567" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle">Li⁺</text>
    </g>
    <g>
      <circle cx="700" cy="560" r="20" fill="#F4A81E" stroke="#C97A18" stroke-width="3"/>
      <text x="700" y="567" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle">Li⁺</text>
    </g>
  </g>
  <text x="600" y="505" font-size="20" font-weight="700" fill="#C96A0F" text-anchor="middle">Li⁺（放電時：負極 → 正極）</text>

  <!-- 充電の注記 -->
  <text x="600" y="712" font-size="17" fill="#7A8Aa0" text-anchor="middle">※ 充電時は逆向き（Li⁺は 正極 → 負極、電子も逆流）</text>

  <!-- 出典・経緯 -->
  <rect x="120" y="740" width="960" height="96" rx="12" fill="#F5F7FA" stroke="#E1E7EE" stroke-width="2"/>
  <text x="140" y="772" font-size="16" fill="#42536A">・ポリアセチレン（電気を通すプラスチック）：白川英樹 1977年発見（2000年ノーベル化学賞）</text>
  <text x="140" y="797" font-size="16" fill="#42536A">・コバルト酸リチウム LiCoO₂：J. グッドイナフら 1980年発見</text>
  <text x="140" y="822" font-size="16" fill="#42536A">・負極への適用と原型の創出：吉野彰ら（旭化成）1981年／1983年（2019年ノーベル化学賞）</text>

  <defs>
    <marker id="agreen" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="aorange" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#E8861E"/>
    </marker>
  </defs>
</svg>
