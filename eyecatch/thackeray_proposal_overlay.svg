<svg width="1040" height="780" viewBox="0 0 1040 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="サッカレが新素材（マンガン酸リチウム）を提案">
  <title>新素材提案オーバーレイ（サッカレ／マンガン酸リチウム）</title>
  <desc>電池反応図＋「新素材を提案！」吹き出し＋名前プレート。写真の横に重ねて使う透過オーバーレイ。</desc>
  <style>text{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}</style>

  <!-- ===== 吹き出し ===== -->
  <g>
    <polygon points="250,104 200,134 252,150" fill="#FFFFFF" stroke="#1F4E96" stroke-width="5"/>
    <rect x="250" y="24" width="762" height="158" rx="30" fill="#FFFFFF" stroke="#1F4E96" stroke-width="5"/>
    <text x="631" y="94" font-size="50" font-weight="800" fill="#1F4E96" text-anchor="middle">新素材を提案！</text>
    <text x="631" y="148" font-size="32" font-weight="700" fill="#6A2EA0" text-anchor="middle">正極にマンガン酸リチウム（LiMnO₂）</text>
  </g>

  <!-- 名前プレート（写真の下に置く想定） -->
  <g transform="translate(40 210)">
    <rect x="0" y="0" width="220" height="78" rx="16" fill="#34495E"/>
    <text x="110" y="36" font-size="30" font-weight="800" fill="#FFFFFF" text-anchor="middle">サッカレ</text>
    <text x="110" y="62" font-size="17" fill="#CBD5E1" text-anchor="middle">M. Thackeray</text>
  </g>

  <!-- ===== 電池反応図（②の再現） ===== -->
  <g transform="translate(0 30)">
    <!-- セル塗り -->
    <rect x="140" y="300" width="420" height="56" fill="#C7EFC1"/>
    <rect x="140" y="356" width="420" height="56" fill="#CFC9F2"/>
    <!-- セル枠 -->
    <rect x="140" y="300" width="420" height="112" fill="none" stroke="#111111" stroke-width="3"/>
    <!-- 集電端子（左右の黒ブラケット） -->
    <path d="M150 290 H132 V422 H150" fill="none" stroke="#111111" stroke-width="6"/>
    <path d="M550 290 H568 V422 H550" fill="none" stroke="#111111" stroke-width="6"/>
    <!-- 赤い破線（セパレータ） -->
    <line x1="140" y1="356" x2="560" y2="356" stroke="#E5392F" stroke-width="5" stroke-dasharray="14 10"/>
    <!-- 極性 -->
    <text x="350" y="282" font-size="62" font-weight="800" fill="#111111" text-anchor="middle">+</text>
    <text x="350" y="470" font-size="62" font-weight="800" fill="#111111" text-anchor="middle">−</text>
    <!-- ラベル・反応式 -->
    <text x="158" y="338" font-size="25" font-weight="700" fill="#111111">MnO₂</text>
    <text x="250" y="338" font-size="23" font-weight="700" fill="#1E8A3B">MnO₂ + Li⁺ + e⁻ ⟶ LiMnO₂</text>
    <text x="158" y="394" font-size="25" font-weight="700" fill="#111111">Li</text>
    <text x="250" y="394" font-size="23" font-weight="700" fill="#2E4FB0">Li ⟶ Li⁺ + e⁻</text>
    <!-- Li+ が境界を移動（小マーク） -->
    <rect x="300" y="346" width="24" height="20" rx="3" fill="none" stroke="#E8861E" stroke-width="2"/>

    <!-- 外部回路 -->
    <g fill="none" stroke="#111111" stroke-width="3">
      <path d="M560 328 H620 V240 H900"/>
      <path d="M900 240 V470 H620 V384 H560"/>
    </g>
    <!-- 電流計（○に斜線） -->
    <circle cx="900" cy="355" r="28" fill="#FFFFFF" stroke="#111111" stroke-width="3"/>
    <line x1="882" y1="373" x2="918" y2="337" stroke="#111111" stroke-width="3"/>
    <!-- 電子の流れ -->
    <text x="752" y="228" font-size="26" font-weight="700" fill="#111111" text-anchor="middle">⟵ e⁻</text>
    <text x="858" y="506" font-size="26" font-weight="700" fill="#111111" text-anchor="middle">e⁻ ↑</text>
  </g>

  <!-- 図キャプション -->
  <text x="520" y="752" font-size="22" fill="#5B6B7B" text-anchor="middle">提案された電池の反応（マンガン酸リチウム系 正極）</text>
</svg>
