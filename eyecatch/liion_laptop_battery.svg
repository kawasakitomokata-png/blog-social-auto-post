<svg width="820" height="560" viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ノートPC用リチウムイオンバッテリー">
  <title>ノートPC用リチウムイオンバッテリー（オリジナルイラスト）</title>
  <desc>内部の円筒セルが見えるリチウムイオン電池パック。Li-ionラベル・充電インジケーター付き（背景透過）。</desc>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4C535C"/><stop offset="1" stop-color="#343A42"/>
    </linearGradient>
    <linearGradient id="cellgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D9DEE3"/><stop offset="0.5" stop-color="#BFC6CD"/><stop offset="1" stop-color="#9CA4AC"/>
    </linearGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="410" cy="478" rx="320" ry="26" fill="#000000" fill-opacity="0.10"/>

  <!-- 金属端子（コネクタ） -->
  <g>
    <rect x="92" y="300" width="40" height="120" rx="8" fill="#5A626B"/>
    <g fill="#E8B84B">
      <rect x="78" y="312" width="20" height="14" rx="3"/>
      <rect x="78" y="340" width="20" height="14" rx="3"/>
      <rect x="78" y="368" width="20" height="14" rx="3"/>
      <rect x="78" y="396" width="20" height="14" rx="3"/>
    </g>
    <g fill="#C9962E"><rect x="78" y="322" width="20" height="4"/><rect x="78" y="350" width="20" height="4"/><rect x="78" y="378" width="20" height="4"/><rect x="78" y="406" width="20" height="4"/></g>
  </g>

  <!-- 本体 -->
  <rect x="120" y="130" width="580" height="310" rx="24" fill="url(#body)" stroke="#2A2F35" stroke-width="3"/>
  <!-- 上ハイライト -->
  <rect x="138" y="142" width="544" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.12"/>

  <!-- セルのカットアウェイ窓 -->
  <rect x="140" y="150" width="476" height="120" rx="12" fill="#1C2026"/>
  
    <g>
      <rect x="148.0" y="168" width="60" height="92" rx="9" fill="url(#cellgrad)"/>
      <rect x="169" y="159" width="18" height="12" rx="3" fill="#AEB6BD"/>
      <ellipse cx="178" cy="170" rx="30.0" ry="8" fill="#E3E8EC"/>
      <rect x="148.0" y="202" width="60" height="26" fill="#2E6FB0"/>
      <text x="178" y="198" font-size="20" font-weight="800" fill="#7E8790" text-anchor="middle">+</text>
    </g>
    <g>
      <rect x="228.0" y="168" width="60" height="92" rx="9" fill="url(#cellgrad)"/>
      <rect x="249" y="159" width="18" height="12" rx="3" fill="#AEB6BD"/>
      <ellipse cx="258" cy="170" rx="30.0" ry="8" fill="#E3E8EC"/>
      <rect x="228.0" y="202" width="60" height="26" fill="#2E6FB0"/>
      <text x="258" y="198" font-size="20" font-weight="800" fill="#7E8790" text-anchor="middle">+</text>
    </g>
    <g>
      <rect x="308.0" y="168" width="60" height="92" rx="9" fill="url(#cellgrad)"/>
      <rect x="329" y="159" width="18" height="12" rx="3" fill="#AEB6BD"/>
      <ellipse cx="338" cy="170" rx="30.0" ry="8" fill="#E3E8EC"/>
      <rect x="308.0" y="202" width="60" height="26" fill="#2E6FB0"/>
      <text x="338" y="198" font-size="20" font-weight="800" fill="#7E8790" text-anchor="middle">+</text>
    </g>
    <g>
      <rect x="388.0" y="168" width="60" height="92" rx="9" fill="url(#cellgrad)"/>
      <rect x="409" y="159" width="18" height="12" rx="3" fill="#AEB6BD"/>
      <ellipse cx="418" cy="170" rx="30.0" ry="8" fill="#E3E8EC"/>
      <rect x="388.0" y="202" width="60" height="26" fill="#2E6FB0"/>
      <text x="418" y="198" font-size="20" font-weight="800" fill="#7E8790" text-anchor="middle">+</text>
    </g>
    <g>
      <rect x="468.0" y="168" width="60" height="92" rx="9" fill="url(#cellgrad)"/>
      <rect x="489" y="159" width="18" height="12" rx="3" fill="#AEB6BD"/>
      <ellipse cx="498" cy="170" rx="30.0" ry="8" fill="#E3E8EC"/>
      <rect x="468.0" y="202" width="60" height="26" fill="#2E6FB0"/>
      <text x="498" y="198" font-size="20" font-weight="800" fill="#7E8790" text-anchor="middle">+</text>
    </g>
    <g>
      <rect x="548.0" y="168" width="60" height="92" rx="9" fill="url(#cellgrad)"/>
      <rect x="569" y="159" width="18" height="12" rx="3" fill="#AEB6BD"/>
      <ellipse cx="578" cy="170" rx="30.0" ry="8" fill="#E3E8EC"/>
      <rect x="548.0" y="202" width="60" height="26" fill="#2E6FB0"/>
      <text x="578" y="198" font-size="20" font-weight="800" fill="#7E8790" text-anchor="middle">+</text>
    </g>

  <!-- ラベル「Li-ion」 -->
  <text x="150" y="372" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="74" font-weight="900" fill="#5BD6A0">Li-ion</text>
  <text x="152" y="410" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="22" fill="#AEB6BD">rechargeable battery</text>

  <!-- 充電インジケーター＋稲妻 -->
  <g transform="translate(470 300)">
    <rect x="0" y="0" width="180" height="78" rx="12" fill="#262B31" stroke="#3C434B" stroke-width="2"/>
    <rect x="180" y="26" width="12" height="26" rx="3" fill="#3C434B"/>
    <rect x="12" y="14" width="44" height="50" rx="5" fill="#34B97E"/>
    <rect x="64" y="14" width="44" height="50" rx="5" fill="#34B97E"/>
    <rect x="116" y="14" width="44" height="50" rx="5" fill="#34B97E"/>
    <path d="M104 6 L78 44 L96 44 L88 74 L120 32 L100 32 Z" fill="#FFD23F" stroke="#262B31" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
