<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="特許の管理を委託する">
  <title>特許の管理を委託する</title>
  <desc>発明（電球）を載せた特許証を、本人から管理を任される専門家へ託すイラスト</desc>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="#F3F7FB"/>
  <circle cx="600" cy="250" r="230" fill="#E6F0FA"/>
  <circle cx="170" cy="120" r="60" fill="#E0ECF8"/>
  <circle cx="1040" cy="500" r="80" fill="#E0ECF8"/>

  <!-- ================= 左：委託する本人（発明者） ================= -->
  <g>
    <!-- 体 -->
    <path d="M150 560 q0 -120 95 -120 q95 0 95 120 z" fill="#3D7BD9"/>
    <!-- 首 -->
    <rect x="225" y="385" width="40" height="40" rx="14" fill="#F2C49B"/>
    <!-- 頭 -->
    <circle cx="245" cy="360" r="50" fill="#F7CFA6"/>
    <!-- 髪 -->
    <path d="M198 352 q5 -55 47 -55 q42 0 47 55 q-20 -22 -47 -22 q-27 0 -47 22 z" fill="#3A2D26"/>
    <!-- 差し出す腕 -->
    <path d="M300 470 q70 -10 120 -45" stroke="#3D7BD9" stroke-width="34" stroke-linecap="round" fill="none"/>
    <!-- 手 -->
    <circle cx="428" cy="418" r="22" fill="#F7CFA6"/>
  </g>

  <!-- ================= 中央：特許証（発明）を受け渡す ================= -->
  <g transform="rotate(-7 600 330)">
    <!-- 用紙の影 -->
    <rect x="468" y="232" width="264" height="190" rx="14" fill="#C9D8EA"/>
    <!-- 用紙 -->
    <rect x="460" y="222" width="264" height="190" rx="14" fill="#FFFFFF" stroke="#D5E0EC" stroke-width="2"/>
    <!-- ヘッダ帯 -->
    <rect x="460" y="222" width="264" height="46" rx="14" fill="#1F4E96"/>
    <rect x="460" y="250" width="264" height="18" fill="#1F4E96"/>
    <text x="592" y="253" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">特 許 証</text>

    <!-- 電球（発明） -->
    <circle cx="540" cy="328" r="26" fill="#FFE082" stroke="#F4B400" stroke-width="3"/>
    <rect x="531" y="350" width="18" height="12" rx="3" fill="#B58A2E"/>
    <path d="M533 358 h14 M533 363 h14" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M540 300 v-12 M518 312 l-9 -9 M562 312 l9 -9" stroke="#F4B400" stroke-width="3" stroke-linecap="round"/>

    <!-- 本文ライン -->
    <rect x="582" y="300" width="118" height="9" rx="4.5" fill="#D9E2EC"/>
    <rect x="582" y="320" width="118" height="9" rx="4.5" fill="#D9E2EC"/>
    <rect x="582" y="340" width="84" height="9" rx="4.5" fill="#D9E2EC"/>

    <!-- 認印（朱印） -->
    <circle cx="676" cy="372" r="22" fill="none" stroke="#E0533D" stroke-width="3"/>
    <text x="676" y="380" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="16" font-weight="700" fill="#E0533D" text-anchor="middle">登録</text>
  </g>

  <!-- 委託の流れ（矢印） -->
  <path d="M512 480 q90 60 176 0" stroke="#3D7BD9" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 16" fill="none"/>
  <path d="M688 480 l-20 -12 m20 12 l-22 8" stroke="#3D7BD9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="600" y="540" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="#2E5AA8" text-anchor="middle">委託</text>

  <!-- ================= 右：管理を任される専門家（代理人） ================= -->
  <g>
    <!-- 体（スーツ） -->
    <path d="M860 560 q0 -120 95 -120 q95 0 95 120 z" fill="#34495E"/>
    <!-- シャツ襟 -->
    <path d="M935 442 l20 26 l20 -26 l-20 -10 z" fill="#FFFFFF"/>
    <!-- ネクタイ -->
    <path d="M955 468 l-9 14 l9 40 l9 -40 z" fill="#C0392B"/>
    <!-- 首 -->
    <rect x="935" y="385" width="40" height="40" rx="14" fill="#F2C49B"/>
    <!-- 頭 -->
    <circle cx="955" cy="360" r="50" fill="#F7CFA6"/>
    <!-- 髪 -->
    <path d="M908 356 q4 -58 47 -58 q43 0 47 58 q-12 -30 -47 -30 q-35 0 -47 30 z" fill="#2B2320"/>
    <!-- 受け取る腕 -->
    <path d="M880 470 q-70 -10 -120 -45" stroke="#34495E" stroke-width="34" stroke-linecap="round" fill="none"/>
    <!-- 手 -->
    <circle cx="752" cy="418" r="22" fill="#F7CFA6"/>
    <!-- 管理バッジ（チェック盾） -->
    <g transform="translate(1018 300)">
      <path d="M0 0 q34 14 60 14 q0 70 -60 96 q-60 -26 -60 -96 q26 0 60 -14 z" fill="#2E9E6B"/>
      <path d="M-22 44 l16 16 l30 -34" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- 地面 -->
  <ellipse cx="600" cy="585" rx="520" ry="22" fill="#DCE6F1"/>
</svg>
